# XcodeGen project spec.
#
# Install XcodeGen on macOS:
#   brew install xcodegen
#
# Generate the .xcodeproj from this file:
#   cd ios
#   xcodegen generate
#
# Then open AxonRemote.xcodeproj in Xcode.
# (Without XcodeGen, follow the "Manual setup" instructions in README.md.)

name: AxonRemote
options:
  bundleIdPrefix: com.axon
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  AxonRemote:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AxonRemote
        excludes:
          - "Info.plist"
    resources:
      - AxonRemote/Assets.xcassets
    info:
      path: AxonRemote/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.axon.remote
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: AxonRemote/Info.plist
